<svg width="900" height="210" viewBox="0 0 900 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VenoxLabs">
  <defs>
    <filter id="soft" x="-10%" y="-25%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#2b2b2b" flood-opacity="0.07"/>
    </filter>
  </defs>

  <style>
    text  { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .card { fill: #faf9f6; stroke: #ece8e0; stroke-width: 1; }
    .kick { fill: #8b8680; font-size: 13px; font-weight: 600; letter-spacing: 3px;
            opacity: 0; animation: fade .7s .15s ease forwards; }
    .word { fill: #2b2b2b; font-size: 60px; font-weight: 500; letter-spacing: -1.8px;
            opacity: 0; animation: rise .8s .35s cubic-bezier(.2,.7,.2,1) forwards; }
    .tag  { fill: #6b6660; font-size: 21px; font-weight: 400;
            opacity: 0; animation: rise .8s 1.15s cubic-bezier(.2,.7,.2,1) forwards; }
    .rule { stroke: #ffb627; stroke-width: 3; stroke-linecap: round;
            stroke-dasharray: 232; stroke-dashoffset: 232;
            animation: draw 1.1s .8s cubic-bezier(.45,0,.1,1) forwards; }
    .dot  { fill: #ffb627; transform-box: fill-box; transform-origin: center;
            animation: pulse 3.4s 1.6s ease-in-out infinite; }

    @keyframes fade { to { opacity: 1; } }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); }
                      to   { opacity: 1; transform: translateY(0); } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); }
                       50%      { opacity: .5; transform: scale(.7); } }
  </style>

  <rect class="card" x="8" y="8" width="884" height="194" rx="18" filter="url(#soft)"/>

  <circle class="dot" cx="58" cy="58" r="5"/>
  <text class="kick" x="76" y="63">ENGINEERING &#183; CODE &#183; AUTOMATION</text>

  <text class="word" x="54" y="132">VenoxLabs</text>
  <line  class="rule" x1="58" y1="150" x2="290" y2="150"/>

  <text class="tag" x="58" y="184">Software. Systeme. Automatisierung.</text>
</svg>
